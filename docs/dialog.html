<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Update Popup</title>

  <link rel="stylesheet" href="styles.css?v=16" />
  <script src="lib/tableau.extensions.1.latest.min.js"></script>
</head>
<body>
  <div id="popup">
    <div class="header">
      <div class="header-left">
        <div class="title-row">

          <!-- ✅ 뱃지: 업데이트 내역 '앞' -->
          <div id="dashBadge" class="dash-badge" style="display:none;"></div>

          <div class="title">업데이트 내역</div>
          <div id="headerDate" class="header-date"></div>

        </div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- ✅ 팝업 동작 안내 -->
    <div class="popup-info">
      <p>업데이트가 있을 경우, 현재 사용 중인 브라우저에서 1회 자동으로 열립니다.</p>
      <p>브라우저 또는 PC가 변경되면 다시 표시될 수 있습니다.</p>
    </div>

    <ul id="items" class="items"></ul>
  </div>

  <script src="dialog.js?v=15"></script>
</body>
</html>
