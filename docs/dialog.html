<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Update Popup</title>

  <link rel="stylesheet" href="styles.css?v=17" />
  <script src="lib/tableau.extensions.1.latest.min.js"></script>
</head>
<body>
  <div id="popup">
    <div class="header">
      <div class="header-left">
        <div class="title-row">

          <!-- ✅ 뱃지: 업데이트 내역 '앞' -->
          <div id="dashBadge" class="dash-badge" style="display:none;"></div>

          <div class="title">업데이트 내역</div>
          <div id="headerDate" class="header-date"></div>

        </div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="popup-info">
      <p>※ 업데이트가 있을 때 현재 브라우저에서 1회 자동으로 표시됩니다.</p>
      <p>※ 브라우저나 PC가 바뀌면 다시 표시될 수 있습니다.</p>
    </div>

    <section id="summarySection" class="summary-card" style="display:none;">
      <div class="section-label">요약</div>
      <p id="summaryText" class="summary-text"></p>
    </section>

    <section id="highlightsSection" class="content-section" style="display:none;">
      <div class="section-label">주요 내용</div>
      <ul id="items" class="items"></ul>
    </section>

    <section id="detailsSection" class="content-section" style="display:none;">
      <div class="section-label">상세 안내</div>
      <div id="detailsList" class="details-list"></div>
    </section>
  </div>

  <script src="dialog.js?v=17"></script>
</body>
</html>
